name: Compilar APK Kardex

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Permisos a gradlew
        run: chmod +x ./gradlew

      - name: Compilar APK (debug)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Guardar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: kardex-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publicar APK en Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kardex-${{ github.run_number }}
          name: Kardex APK (build ${{ github.run_number }})
          files: app/build/outputs/apk/debug/*.apk
